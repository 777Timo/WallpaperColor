name: WallpaperColorApp
options:
  bundleIdPrefix: com.wallpapercolor
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"

targets:
  WallpaperColorApp:
    type: application
    platform: macOS
    sources:
      - path: WallpaperColorApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallpapercolor.app
        PRODUCT_NAME: WallpaperColor
        INFOPLIST_FILE: WallpaperColorApp/App/Info.plist
        ENABLE_APP_SANDBOX: "NO"
